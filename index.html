<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 2px solid #333;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            border-radius: 5px;
        }
        
        input:focus {
            border-color: #666;
        }
        
        .message {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            min-height: 40px;
        }
        
        .success {
            color: #00ff00;
        }
        
        .error {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="token" placeholder="XXXX-XXXX" maxlength="9" autocomplete="off">
        <div id="message" class="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        
        if (urlToken) {
            document.getElementById('token').value = urlToken;
            checkToken();
        }
        
        async function checkToken() {
            const token = document.getElementById('token').value.trim();
            const msgDiv = document.getElementById('message');
            
            if (!token || !token.match(/^[A-Z0-9]{4}-[A-Z0-9]{4}$/)) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Invalid!';
                return;
            }
            
            try {
                const response = await fetch('/api/verify-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                
                const data = await response.json();
                
                if (data.valid) {
                    msgDiv.className = 'message success';
                    msgDiv.textContent = 'Success';
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = 'Invalid!';
                }
            } catch {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Invalid!';
            }
        }

        let timeout = null;
        document.getElementById('token').addEventListener('input', function() {
            clearTimeout(timeout);
            timeout = setTimeout(checkToken, 500);
        });
    </script>
</body>
</html>
